# MongoDB configuration for oauth_containers

storage:
  dbPath: /data/db
  wiredTiger:
    engineConfig:
      # Constrain cache in dev so Mongo doesn't consume the host
      cacheSizeGB: 0.25

systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true

net:
  bindIp: 0.0.0.0
  port: 27017

security:
  authorization: enabled
