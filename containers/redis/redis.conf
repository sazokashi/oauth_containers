# Redis configuration for oauth_containers

# Network — bind all interfaces inside the container; access is
# restricted at the Docker network level (backend-only network)
bind 0.0.0.0
port 6379

# Memory policy — evict least-recently-used keys under pressure
maxmemory 128mb
maxmemory-policy allkeys-lru

# No persistence — Redis is a cache layer, not a source of truth.
# Token and rate-limit data can be reconstructed from MongoDB.
save ""
appendonly no

# Logging
loglevel notice

# Security — password is injected at runtime via the CMD override
# in docker-compose, keeping this config file secret-free.
# requirepass is set via --requirepass flag in compose command.
