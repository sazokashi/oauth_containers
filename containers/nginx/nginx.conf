# ──────────────────────────────────────────────────────────────
# Nginx reverse proxy for oauth_containers
# First line of defense: rate limiting, security headers,
# request size limits — all enforced before traffic reaches Node.
# ──────────────────────────────────────────────────────────────

# Rate-limit zones (shared memory, keyed by client IP)
limit_req_zone $binary_remote_addr zone=login:10m      rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_write:10m   rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

upstream oauth_api {
    server oauth-api:3001;
}

server {
    listen 80;
    server_name _;

    # Don't leak server version
    server_tokens off;

    # Reject oversized request bodies
    client_max_body_size 2m;

    # ── Security headers (applied to every response) ──────────
    # Prevent clickjacking
    add_header X-Frame-Options        "DENY"                              always;
    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options  "nosniff"                           always;
    # Control referrer leaking
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    # Legacy XSS protection for older browsers
    add_header X-XSS-Protection        "1; mode=block"                     always;
    # HSTS — require HTTPS for one year (including subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Auth endpoints — strictest rate limit ─────────────────
    location ~ ^/api/(oauth/token|session/login|users/register|password/(forgot|reset)) {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://oauth_api;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ── State-changing API routes ─────────────────────────────
    location ~ ^/api/(session|users|social) {
        limit_req zone=api_write burst=10 nodelay;
        proxy_pass http://oauth_api;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ── Health check (no rate limit) ──────────────────────────
    location = /health {
        proxy_pass http://oauth_api;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }

    # ── Catch-all for remaining API traffic ───────────────────
    location / {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://oauth_api;
        include /etc/nginx/conf.d/proxy-headers.conf;
    }
}
